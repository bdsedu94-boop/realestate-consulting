<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수강생 경매 투자 방향성 컨설팅</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px;color:#1a1a1a;background:#f7f6f2;min-height:100vh}
.wrap{max-width:1240px;margin:0 auto;padding:2rem 1.5rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{border-radius:10px;padding:0.8rem 1rem}
.stat .slb{font-size:11px;margin-bottom:4px;font-weight:500}
.stat .sval{font-size:22px;font-weight:700}
.cards{display:grid;gap:14px;grid-template-columns:1fr}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.1rem 1.25rem;position:relative}
.card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding-right:52px}
.av{width:42px;height:42px;border-radius:50%;background:#f0ede6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#5f5e5a;flex-shrink:0;text-align:center;line-height:1.2}
.rg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:9px}
.rbox{border-radius:8px;padding:6px 7px}
.rbox .rl{font-size:10px;font-weight:600;margin-bottom:1px;opacity:0.85}
.rbox .rv{font-size:12px;font-weight:700;margin-bottom:2px}
.rbox .rn{font-size:9px;opacity:0.85;line-height:1.3}
.bid-row{background:#f7f6f2;border-radius:8px;padding:8px 10px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.bid-row .bl{font-size:10px;color:#888;margin-bottom:2px}
.bid-row .bv{font-size:12px;font-weight:700;color:#1a1a1a}
.dir-box{padding:7px 10px;border-radius:8px;font-size:11px;font-weight:700}
.sbadge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;margin-bottom:5px}
.s-완료{background:#eaf3de;color:#27500a}
.s-재상담{background:#faeeda;color:#633806}
.s-대기{background:#f0ede6;color:#5f5e5a}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.flg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin:2px 2px 0 0;background:#faeeda;color:#633806;font-weight:500}
.note-text{font-size:11px;color:#888;margin-top:6px}
.ltv-info{background:#f7f6f2;border-radius:7px;padding:6px 10px;margin-bottom:8px;font-size:11px;color:#888;display:flex;align-items:center;gap:5px}
.ltv-info strong{color:#1a1a1a;font-weight:600}
.consult-note{font-size:11px;color:#0c447c;background:#e6f1fb;border-radius:6px;padding:4px 8px;margin-top:6px}
.consult-date{font-size:10px;color:#aaa;margin-top:4px}
.bv-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:#eaf3de;color:#27500a;font-weight:600;margin-left:6px;vertical-align:middle}
.del-btn-inline,.edit-btn-inline,.pdf-btn-inline{width:20px;height:20px;border:none;background:none;color:#ccc;font-size:12px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:0}
.del-btn-inline:hover{background:#fcebeb;color:#a32d2d}
.edit-btn-inline:hover{background:#e6f1fb;color:#0c447c}
.pdf-btn-inline:hover{background:#fdf3e0;color:#a3690a}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:0.75rem}
.ctrls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:8px}
select,input[type=text],input[type=number]{border:1px solid rgba(0,0,0,0.15);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff;outline:none}
select:hover,input:focus{border-color:rgba(0,0,0,0.3)}
button{border:1px solid rgba(0,0,0,0.15);border-radius:7px;padding:6px 14px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;cursor:pointer;transition:all 0.15s}
button:hover{background:#f0ede6}
.btn-p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-p:hover{background:#333}
.sync-bar{display:flex;align-items:center;justify-content:space-between;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:6px 14px;margin-bottom:1rem;font-size:12px}
.sync-dot{width:8px;height:8px;border-radius:50%;margin-right:6px;display:inline-block;flex-shrink:0}
.sync-ok .sync-dot{background:#27500a}
.sync-syncing .sync-dot{background:#633806;animation:pulse 1s infinite}
.sync-error .sync-dot{background:#791f1f}
.sync-offline .sync-dot{background:#aaa}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.view-tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.vtab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,0.12);background:#fff;color:#888;transition:all 0.15s}
.vtab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.form-wrap{background:#f7f6f2;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;display:none}
.form-wrap h3{font-size:15px;font-weight:700;margin-bottom:1rem}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
@media(max-width:640px){.fg{grid-template-columns:1fr 1fr}}
.fl{font-size:12px;color:#666;display:block;margin-bottom:4px}
.chk-grp{display:flex;flex-direction:column;gap:5px;padding-top:2px}
.chk-grp label{font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(680px,94vw);max-height:90vh;overflow-y:auto;position:relative}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:0}
.analytics{display:none}
.an-section{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem;margin-bottom:14px}
.an-title{font-size:14px;font-weight:700;margin-bottom:1rem}
.cohort-table{width:100%;border-collapse:collapse;font-size:13px}
.cohort-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #f0ede6;white-space:nowrap}
.cohort-table td{padding:9px 12px;border-bottom:0.5px solid #f7f6f2;vertical-align:middle}
.cohort-table tr:last-child td{border-bottom:none}
.cohort-table tr:hover td{background:#fafaf8}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row .br-label{font-size:12px;color:#1a1a1a;width:140px;flex-shrink:0;font-weight:500}
.bar-track{flex:1;height:18px;background:#f0ede6;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:2px}
.bar-fill span{font-size:10px;font-weight:700;color:#fff}
.br-count{font-size:12px;color:#888;width:40px;text-align:right;flex-shrink:0}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.an-grid{grid-template-columns:1fr}}
.an-kpi{background:#f7f6f2;border-radius:10px;padding:1rem;text-align:center}
.an-kpi .kv{font-size:28px;font-weight:700;margin-bottom:2px}
.an-kpi .kl{font-size:11px;color:#888}
.lay-btn-group{display:flex;border:1px solid rgba(0,0,0,0.15);border-radius:7px;overflow:hidden}
.lay-btn{border:none;border-radius:0;padding:6px 11px;font-size:12px;cursor:pointer;background:#fff;color:#1a1a1a;border-right:1px solid rgba(0,0,0,0.1)}
.lay-btn:last-child{border-right:none}
.lay-btn.on{background:#1a1a1a;color:#fff}
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <div>
      <h1 style="font-size:22px;font-weight:800">수강생 투자 방향성 컨설팅 <span class="bv-badge">v3</span></h1>
      <p style="font-size:12px;color:#888;margin-top:4px">실시간 팀 공유 · SQLite DB · 상담상태관리 · 기수별 분석</p>
      <div class="ctrls">
        <select id="fC" onchange="loadStudents()"><option value="">전체 기수</option><option value="45기">45기</option><option value="46기">46기</option><option value="47기">47기</option></select>
        <select id="fH" onchange="loadStudents()">
          <option value="">전체 유형</option>
          <option value="생애최초">생애최초</option>
          <option value="무주택">무주택</option>
          <option value="1주택">1주택</option>
          <option value="다주택">다주택</option>
          <option value="미기입">미기입</option>
        </select>
        <select id="fSt" onchange="loadStudents()">
          <option value="">전체 상태</option>
          <option value="대기">상담 대기</option>
          <option value="완료">상담 완료</option>
          <option value="재상담">재상담 필요</option>
        </select>
        <input type="text" id="fQ" placeholder="🔍 이름 검색" oninput="debounceLoad()" style="width:120px">
        <button onclick="toggleForm()">+ 수강생 추가</button>
        <button onclick="document.getElementById('xlsxInput').click()" style="background:#1a6b8a;color:#fff">📤 Excel 업로드</button>
        <input type="file" id="xlsxInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(this)">
        <button onclick="exportCSV()" style="background:#27500a;color:#fff">📥 CSV 내보내기</button>
      </div>
    </div>
  </div>

  <div class="sync-bar sync-syncing" id="syncBar">
    <div style="display:flex;align-items:center">
      <span class="sync-dot"></span>
      <span id="syncMsg">서버에 연결 중...</span>
    </div>
    <button onclick="loadStudents()" style="font-size:11px;padding:3px 10px">새로고침</button>
  </div>

  <div class="view-tabs">
    <button class="vtab on" id="tab-card" onclick="switchView('card')">📋 카드 뷰</button>
    <button class="vtab" id="tab-an" onclick="switchView('an')">📊 분석 뷰</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="form-wrap" id="addForm">
    <h3>새 수강생 추가</h3>
    <div class="fg">
      <div><label class="fl">기수</label><input id="fA" type="text" placeholder="예: 47기" style="width:100%"></div>
      <div><label class="fl">이름</label><input id="fN" type="text" placeholder="이름" style="width:100%"></div>
      <div><label class="fl">주택 보유</label>
        <select id="fHT" style="width:100%">
          <option value="생애최초">생애최초</option>
          <option value="무주택">무주택</option>
          <option value="1주택" selected>1주택</option>
          <option value="다주택">다주택</option>
        </select></div>
      <div><label class="fl">투자 시드 (만원)</label><input id="fS" type="number" placeholder="예: 3000" style="width:100%"></div>
      <div><label class="fl">신용대출 가능 금액 (만원)</label><input id="fCr" type="number" placeholder="없거나 모르면 0" style="width:100%"></div>
      <div><label class="fl">대출 가능</label>
        <select id="fL" style="width:100%">
          <option value="unknown">모름/미확인</option>
          <option value="Y">가능</option>
          <option value="N">불가 (올현금)</option>
        </select></div>
      <div><label class="fl">전입신고 가능</label>
        <select id="fT" style="width:100%">
          <option value="unknown">미기재</option>
          <option value="Y">가능</option>
          <option value="N">불가</option>
        </select></div>
      <div><label class="fl">특이사항</label><input id="fNote" type="text" placeholder="가족명의, 기대출 등" style="width:100%"></div>
      <div><label class="fl">플래그</label>
        <div class="chk-grp">
          <label><input type="checkbox" id="ff1"> 기대출 많음</label>
          <label><input type="checkbox" id="ff2"> 전문가 확인 필요</label>
          <label><input type="checkbox" id="ff3"> 명의 활용 가능</label>
        </div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-p" onclick="addStudent()">추가하기</button>
      <button onclick="toggleForm()">취소</button>
    </div>
  </div>

  <div id="cardView"><div class="cards" id="cards"></div></div>

  <div class="analytics" id="anView">
    <div class="an-grid" style="margin-bottom:14px" id="anKpi"></div>
    <div class="an-section">
      <div class="an-title">기수별 현황</div>
      <div style="overflow-x:auto"><table class="cohort-table" id="cohortTable"></table></div>
    </div>
    <div class="an-grid">
      <div class="an-section"><div class="an-title">상담 상태 분포</div><div id="anStatus"></div></div>
      <div class="an-section"><div class="an-title">주택 보유 유형 분포</div><div id="anHousing"></div></div>
      <div class="an-section"><div class="an-title">시드 금액대 분포</div><div id="anSeed"></div></div>
      <div class="an-section"><div class="an-title">투자 방향 분포</div><div id="anDir"></div></div>
    </div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <h3>수강생 정보 수정</h3>
    <div class="fg">
      <div><label class="fl">기수</label><input id="em-cohort" type="text" style="width:100%"></div>
      <div><label class="fl">이름</label><input id="em-name" type="text" style="width:100%"></div>
      <div><label class="fl">주택 보유</label>
        <select id="em-h" style="width:100%">
          <option value="생애최초">생애최초</option>
          <option value="무주택">무주택</option>
          <option value="1주택">1주택</option>
          <option value="다주택">다주택</option>
        </select></div>
      <div><label class="fl">투자 시드 (만원)</label><input id="em-s" type="number" style="width:100%"></div>
      <div><label class="fl">신용대출 가능 금액 (만원)</label><input id="em-cr" type="number" style="width:100%"></div>
      <div><label class="fl">대출 가능</label>
        <select id="em-l" style="width:100%">
          <option value="unknown">모름/미확인</option>
          <option value="Y">가능</option>
          <option value="N">불가 (올현금)</option>
        </select></div>
      <div><label class="fl">전입신고 가능</label>
        <select id="em-t" style="width:100%">
          <option value="unknown">미기재</option>
          <option value="Y">가능</option>
          <option value="N">불가</option>
        </select></div>
      <div><label class="fl">상담 상태</label>
        <select id="em-status" style="width:100%">
          <option value="대기">상담 대기</option>
          <option value="완료">상담 완료</option>
          <option value="재상담">재상담 필요</option>
        </select></div>
      <div><label class="fl">상담일</label><input id="em-date" type="text" placeholder="예: 2025.04" style="width:100%"></div>
      <div><label class="fl">특이사항</label><input id="em-note" type="text" style="width:100%"></div>
      <div><label class="fl">상담 메모</label><input id="em-cnote" type="text" placeholder="상담 시 주요 내용" style="width:100%"></div>
      <div><label class="fl">플래그</label>
        <div class="chk-grp">
          <label><input type="checkbox" id="em-f1"> 기대출 많음</label>
          <label><input type="checkbox" id="em-f2"> 전문가 확인 필요</label>
          <label><input type="checkbox" id="em-f3"> 명의 활용 가능</label>
        </div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-p" onclick="saveEdit()">저장</button>
      <button onclick="closeEdit()">취소</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

/* ── 동기화 상태 ── */
function setSyncBar(cls,msg){document.getElementById('syncBar').className='sync-bar '+cls;document.getElementById('syncMsg').textContent=msg;}
function timeStr(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function debounceLoad(){clearTimeout(debounceTimer);debounceTimer=setTimeout(loadStudents,300);}

/* ── API 호출 ── */
async function api(url,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  const text=await res.text();
  try{
    const json=JSON.parse(text);
    if(!res.ok)throw new Error(json.error||`서버 오류 (${res.status})`);
    return json;
  }catch(e){
    if(!res.ok)throw new Error(`서버에 연결할 수 없습니다 (HTTP ${res.status})`);
    throw e;
  }
}

/* ── 수강생 로드 ── */
async function loadStudents(){
  const c=document.getElementById('fC').value,h=document.getElementById('fH').value;
  const st=document.getElementById('fSt').value,q=document.getElementById('fQ').value.trim();

  if(previewMode){
    // 미리보기 모드: 클라이언트 필터링
    let list=BASE.map((d,i)=>({...d,id:i+1}));
    if(c) list=list.filter(s=>s.cohort===c);
    if(h) list=list.filter(s=>s.housing_type===h);
    if(st) list=list.filter(s=>s.status===st);
    if(q) list=list.filter(s=>s.name&&s.name.includes(q));
    students=list;
    render();
    return;
  }

  setSyncBar('sync-syncing','불러오는 중...');
  try{
    const params=new URLSearchParams();
    if(c)params.set('cohort',c);if(h)params.set('housing_type',h);
    if(st)params.set('status',st);if(q)params.set('search',q);
    students=await api('/api/students?'+params);
    setSyncBar('sync-ok','마지막 동기화: '+timeStr());
    await loadCohorts();
    render();
  }catch(e){
    if(!previewMode) setSyncBar('sync-error','⚠ 오류: '+e.message);
  }
}

async function loadCohorts(){
  try{
    const cohorts = previewMode
      ? [...new Set(BASE.map(s=>s.cohort))].sort()
      : await api('/api/cohorts');
    const sel=document.getElementById('fC'),cur=sel.value;
    sel.innerHTML='<option value="">전체 기수</option>'+cohorts.map(c=>`<option value="${c}">${c}</option>`).join('');
    if(cohorts.includes(cur))sel.value=cur;
  }catch(e){}
}

/* ── 첫 실행 시 초기 데이터 시드 ── */
async function initData(){
  setSyncBar('sync-syncing','서버에 연결 중...');
  try{
    // 먼저 기존 데이터 확인
    const existing = await api('/api/students');
    if(Array.isArray(existing) && existing.length > 0){
      // 이미 데이터 있음 → 바로 표시
      students = existing;
      setSyncBar('sync-ok','마지막 동기화: '+timeStr());
      await loadCohorts();
      render();
    } else {
      // 데이터 없음 → 초기 데이터 시드 시도
      try{
        await api('/api/seed','POST',{students:BASE});
      }catch(e){
        console.log('초기 시드 생략 — 수동으로 수강생을 추가해주세요.');
      }
      await loadStudents();
    }
  }catch(e){
    // 서버 미연결 → 미리보기 모드
    previewMode=true;
    students=BASE.map((d,i)=>({...d,id:i+1}));
    setSyncBar('sync-offline','📋 미리보기 모드 — Railway 배포 후 실시간 공유 시작');
    await loadCohorts();
    render();
  }
}

  if(previewMode){
    const idx=students.findIndex(st=>st.id===id);

  try{

}

async function importExcel(input){
  const file=input.files[0]; input.value='';
  if(!file)return;
  try{
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:'array'});

    // 시트 선택: 요약 > 수강생 리스트 > 첫 번째 시트
    const sheetName=wb.SheetNames.find(n=>n.trim()==='요약')
      || wb.SheetNames.find(n=>n.includes('수강생'))
      || wb.SheetNames[0];
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length<2){alert('데이터가 없습니다.');return;}

    // 헤더 행 찾기 (기수가 있는 행)
    let headerIdx=0;
    for(let i=0;i<Math.min(5,rows.length);i++){
      if(rows[i].some(c=>String(c).includes('기수')||String(c).includes('성함')||String(c).includes('이름'))){
        headerIdx=i; break;
      }
    }
    const header=rows[headerIdx].map(h=>String(h).trim());

    // 컬럼 인덱스 찾기
    const ci=(...names)=>{
      for(const name of names){
        const idx=header.findIndex(h=>h.replace(/\s/g,'').includes(name.replace(/\s/g,'')));
        if(idx>=0) return idx;
      }
      return -1;
    };

    const iCohort=ci('기수');
    const iName=ci('성함','이름','성명');
    const iLoc=ci('거주지','거주 지');
    const iHousing=ci('주택보유','주택수','주택 보유','주택 수');
    const iSeed=ci('투자가능한금액','투자가능금액','투자금액','투자금');
    const iLoanAvail=ci('추가신용대출가능여부','신용대출가능여부','추가신용대출');
    const iCreditAmt=ci('신용대출이가능한경우','가능한금액');
    const iCreditLoan=iLoanAvail>=0?iLoanAvail:ci('신용대출');
    const iTransfer=ci('전입가능여부','전입가능','전입 가능');
    const iPurpose=ci('경매투자목적','투자목적','경매 투자 목적','투자 목적');
    const iNote=ci('특이사항','비고');
    const iLastCol=header.length-1;

    function mapLoan(v){
      if(!v||String(v).trim()==='') return 'unknown';
      const s=String(v).trim();
      if(s.includes('잘 모르겠음')||s.includes('모르')||s.includes('불확실')) return 'unknown';
      if(s.includes('불가')) return 'N';
      if(s.includes('가능')) return 'Y';
      return 'unknown';
    }

    function mapLoanCredit(loanVal, amtVal){
      // 신규 양식: 대출가능여부 + 금액 분리
      if(iCreditAmt>=0){
        const loan=mapLoan(loanVal);
        let credit=0;
        if(loan==='Y'&&amtVal){
          credit=parseSeedAmt(String(amtVal));
        }
        return{loan,credit};
      }
      // 이전 양식: 통합 컬럼 처리
      if(!loanVal||String(loanVal).trim()==='')return{loan:'unknown',credit:0};
      const s=String(loanVal).trim();
      if(s.includes('잘 모르겠음')||s.includes('모르'))return{loan:'unknown',credit:0};
      if(s.includes('불가'))return{loan:'N',credit:0};
      if(s.includes('가능')){
        return{loan:'Y',credit:parseSeedAmt(s)};
      }
      return{loan:'unknown',credit:0};
    }

    function parseSeedAmt(s){
      s=String(s).replace(/,/g,'').trim();
      const mCombo=s.match(/(\d+\.?\d*)억\s*(\d+\.?\d*)?\s*(천만|천|만)?/);
      if(mCombo&&mCombo[1]){
        let v=Math.round(parseFloat(mCombo[1])*10000);
        if(mCombo[2]){const u=mCombo[3];v+=Math.round(parseFloat(mCombo[2])*((u==='천만'||u==='천'||!u)?1000:1));}
        return v;
      }
      const m2=s.match(/(\d+)천만/);const m3=s.match(/(\d+\.?\d*)만/);
      const mR=s.match(/\d+[~\-]\s*(\d+\.?\d*)(천만|만)/);
      const mR2=s.match(/\d+[~\-]\s*(\d+)/);
      const mN=s.match(/^(\d+)$/);
      if(m2)return parseInt(m2[1])*1000;
      if(m3)return Math.round(parseFloat(m3[1]));
      if(mR)return Math.round(parseFloat(mR[1])*(mR[2]==='천만'?1000:1));
      if(mR2)return parseInt(mR2[1]);
      if(mN)return parseInt(mN[1]);
      return 0;
    }
    function mapTransfer(v){
      const s=String(v||'').trim();
      if(s.includes('불가')) return'N';
      if(s.includes('가능')) return'Y';
      return'unknown';
    }
    function mapPurpose(v){
      const s=String(v||'').trim();
      const hasDanta=s.includes('단타');
      const hasSilgeoju=s.includes('실거주');
      if(hasDanta&&hasSilgeoju) return'단타+실거주';
      if(hasDanta) return'단타';
      if(hasSilgeoju) return'실거주';
      return'unknown';
    }
    function mapHousing(v){
      const s=String(v||'').trim();
      if(!s)return'미기입';
      if(s.includes('생애최초'))return'생애최초';
      if(s.includes('다주택'))return'다주택';
      if(s.includes('1주택'))return'1주택';
      if(s.includes('무주택'))return'무주택';
      return'미기입';
    }
    function parseSeed(v){
      if(!v||String(v).trim()==='')return 0;
      const s=String(v).replace(/,/g,'').trim();
      // "1억 5천만원", "1억5천만" 등 억+천만/만 combo 우선 처리
      const mCombo=s.match(/(\d+\.?\d*)억\s*(\d+\.?\d*)?\s*(천만|천|만)?/);
      if(mCombo&&mCombo[1]){
        let total=Math.round(parseFloat(mCombo[1])*10000);
        if(mCombo[2]){
          const unit=mCombo[3];
          const mult=(unit==='천만'||unit==='천'||!unit)?1000:1;
          total+=Math.round(parseFloat(mCombo[2])*mult);
        }
        return total;
      }
      const m2=s.match(/(\d+)천만/);
      const m3=s.match(/(\d+\.?\d*)만/);
      const m4=s.match(/^(\d+)$/);
      if(m2) return parseInt(m2[1])*1000;
      if(m3) return Math.round(parseFloat(m3[1]));
      if(m4) return parseInt(m4[1]);
      // 범위 처리: 2~7천만, 1500~2000 등 → 최댓값 사용
      const mRange1=s.match(/\d+[~\-]\s*(\d+\.?\d*)(천만|만)/);
      if(mRange1){
        const mult=mRange1[2]==='천만'?1000:1;
        return Math.round(parseFloat(mRange1[1])*mult);
      }
      const mRange2=s.match(/\d+[~\-]\s*(\d+)/);
      if(mRange2) return parseInt(mRange2[1]); // 단위 없는 숫자 범위 → 최댓값
      return 0;
    }

    const newStudents=[];
    for(let i=headerIdx+1;i<rows.length;i++){
      const r=rows[i];
      const name=String(r[iName]||'').trim();
      if(!name||name==='nan')continue;
      const cohort=String(r[iCohort]||'').trim()||'미정';
      const loc=iLoc>=0?String(r[iLoc]||'').trim():'';
      const rawNote=iNote>=0&&r[iNote]?String(r[iNote]).trim()
        :r[iLastCol]?String(r[iLastCol]).trim():'';
      const note=[loc?loc+' 거주':'',rawNote].filter(Boolean).join(' · ');
      const {loan,credit}=mapLoanCredit(r[iLoanAvail>=0?iLoanAvail:iCreditLoan], iCreditAmt>=0?r[iCreditAmt]:undefined);

      newStudents.push({
        cohort, name,
        housing_type:mapHousing(r[iHousing]),
        seed_amount:parseSeed(r[iSeed]),
        credit_amount:credit,
        loan_available:loan,
        transfer_available:mapTransfer(r[iTransfer]),
        investment_purpose:iPurpose>=0?mapPurpose(r[iPurpose]):'unknown',
        note, flags:[],
        status:'대기', consult_date:'', consult_note:''
      });
    }

    if(!newStudents.length){
      alert(`등록할 수강생이 없습니다.\n감지된 헤더: ${header.slice(0,5).join(', ')}\n이름 컬럼(${iName}), 기수 컬럼(${iCohort})`);
      return;
    }
    const preview=newStudents.slice(0,5).map(s=>`${s.cohort} ${s.name}(${s.housing_type})`).join('\n');
    if(!confirm(`${newStudents.length}명을 일괄 등록하시겠습니까?\n\n${preview}${newStudents.length>5?'\n...외 '+(newStudents.length-5)+'명':''}`))return;
    if(previewMode){
      const maxId=students.length?Math.max(...students.map(s=>s.id)):0;
      newStudents.forEach((s,i)=>students.push({...s,id:maxId+i+1}));
      await loadCohorts();render();
      alert(`${newStudents.length}명 등록 완료! (시트: ${sheetName})`);
    }else{
      await api('/api/students/bulk','POST',{students:newStudents});
      await loadStudents();
      alert(`${newStudents.length}명 등록 완료! (시트: ${sheetName})`);
    }
  }catch(e){alert('Excel 파싱 오류: '+e.message);console.error(e);}
}

/* ── 방향성 텍스트 생성 ── */
function formatBidNarrative(d){
  if(d.housing_type==='미기입'){
    return'⚠ 주택수 미기입 - 확인 필요 (상담 시 주택 보유 현황을 먼저 파악해주세요)';
  }
  const cr=d.credit_amount||0,total=d.seed_amount+cr;
  const tY=d.transfer_available==='Y';
  const isFirst=d.housing_type==='생애최초',noHouse=d.housing_type==='무주택'||isFirst;
  const oneHouse=d.housing_type==='1주택',multi=!noHouse&&!oneHouse;
  const CAP=50000;
  const isOlhyun=(d.flags||[]).includes('올현금');
  function fs(v){
    v=Math.min(v,CAP);
    if(v>=10000){const a=Math.floor(v/10000),r=v%10000;
      if(!r)return a+'억원';
      if(r%1000===0)return a+'억 '+(r/1000)+'천만원';
      return a+'억 '+r.toLocaleString()+'만원';}
    if(v%1000===0)return (v/1000)+'천만원';
    return v.toLocaleString()+'만원';
  }
  function fsNoCap(v){
    if(v>=10000){const a=Math.floor(v/10000),r=v%10000;
      if(!r)return a+'억원';
      if(r%1000===0)return a+'억 '+(r/1000)+'천만원';
      return a+'억 '+r.toLocaleString()+'만원';}
    if(v%1000===0)return (v/1000)+'천만원';
    return v.toLocaleString()+'만원';
  }

  // 올현금 플래그: 경락잔금대출 미활용 → 올현금 투자만
  if(isOlhyun){
    const area=tY?'수도권 규제·비규제':'수도권 비규제';
    const regionOh=total<=15000?' (인천, 부천)':' (인천, 경기외곽)';
    const lines=[];
    lines.push(area+' 빌라 '+fs(total)+' 이하'+regionOh+' (올현금)');
    lines.push('비수도권 APT '+fs(total)+' (올현금)');
    return lines.map((l,i)=>(i+1)+'. '+l).join('\n');
  }
  const l60bid=Math.min(Math.round(total/0.4/100)*100,CAP);
  const l80bid=Math.min(Math.round(total/0.2/100)*100,CAP);
  const localMin=Math.max(8300,l60bid);
  const hasLocal=l80bid>=8300;
  const snr70=tY?Math.min(Math.round(total/0.3/100)*100,CAP):null;
  // 자기자금 3,000만원 미만은 레버리지 계산 자체를 적용하지 않음
  const snrOk=snr70&&total>=3000&&snr70*0.7>=5000;
  // 인천·부천 추천: 실제 입찰가 기준 (LTV 가능시 입찰가, 불가시 시드)
  const bidForRegion=snrOk&&snr70?snr70:total;
  const region=bidForRegion<=15000?' (인천, 부천)':'';
  const lines=[];
  const needsCrCheck=cr===0; // 신용대출 금액 미확인 → 새 형식
  // 전체 LTV 불가 케이스 (수도권 LTV 미달 + 비수도권 최소입찰가 미달)
  const allFail=!snrOk&&!hasLocal;
  // allFail 지역: 무주택=규제·비규제(현금+신용), 1주택/다주택=비규제만
  const areaF=noHouse?'수도권 규제·비규제':'수도권 비규제';
  if(allFail){
    lines.push(needsCrCheck
      ?areaF+'지역 현금+신용대출 활용해 올현금 입찰 가능 물건 (신용대출 가능금액 확인 필요)'
      :areaF+' 빌라 시드+신용대출 합산 금액으로 입찰 검토'+region);
    return lines.map((l,i)=>(i+1)+'. '+l).join('\n');
  }
  if(multi){
    if(needsCrCheck){
      lines.push('수도권 비규제 APT·빌라 현금+신용대출 활용해 올현금 입찰 가능 물건 (공시가 1억이하)');
    }else{
      const regionMulti=total<=15000?' (인천, 부천)':'';
      lines.push('수도권 비규제 APT·빌라 '+fs(Math.min(total,50000))+' 이하 (공시가 1억이하)'+regionMulti);
    }
  }else if(noHouse){
    const wantsResidenceNH=tY&&(d.investment_purpose==='실거주'||d.investment_purpose==='단타+실거주');
    const aptBid=tY&&snrOk?snr70:total;
    // 현금+신용대출은 전입 없이도 규제지역 가능 → 항상 규제·비규제
    const area='수도권 규제·비규제';
    if(wantsResidenceNH&&snrOk){
      // 실거주(또는 단타+실거주) 목적 + 전입가능이면 5억 상한 없이 LTV 60~70% 범위로 표시
      const bid60=Math.round(total/0.4/100)*100;
      const bid70=Math.round(total/0.3/100)*100;
      lines.push(area+' APT '+fsNoCap(bid60)+' ~ '+fsNoCap(bid70)+' 이하');
    }else if(aptBid>15000){
      const aptRegion=aptBid>=30000?'':' (인천, 경기외곽)';
      lines.push(area+' APT '+fs(Math.min(aptBid,50000))+' 이하'+aptRegion);
    }else{
      if(needsCrCheck&&(!snrOk||!tY)){
        lines.push(area+'지역 현금+신용대출 활용해 올현금 입찰 가능 물건 (신용대출 가능금액 확인 필요)');
      }else{
        if(!tY){
          lines.push(area+' 빌라 '+fs(total)+' 이하'+(aptBid>=13000?'':' (인천, 부천)'));
        }else if(!snrOk){
          // 전입은 가능하나 자기자금 3,000만원 미만 등으로 레버리지 계산 불가 → 통일된 안내문구
          lines.push(area+' 빌라 현금+신용대출 활용해 올현금 입찰 가능 물건'+(total>=13000?'':' (인천, 부천)'));
        }else{
          // 1억3천 이상이면 빌라·아파트 함께 표기 (지역 표시 없음), 1.3억 미만은 빌라만 + 인천·부천
          const propType=aptBid>=13000?'빌라·아파트':'빌라';
          const regionTag=aptBid>=13000?'':' (인천, 부천)';
          lines.push(area+' '+propType+' '+fs(aptBid)+' 이하'+regionTag);
        }
      }
    }
  }else if(oneHouse){
    const regionOne=total<=15000?' (인천, 부천)':(total<30000?' (인천, 경기외곽)':'');
    // 기존주택 처분조건 + 전입조건 충족 시 1주택자도 수도권 규제지역 조건부 가능
    const wantsResidence=tY&&(d.investment_purpose==='실거주'||d.investment_purpose==='단타+실거주');
    if(wantsResidence){
      const condNote=' (기존주택 처분조건부·전입조건부)';
      if(snrOk){
        const bid60=Math.round(total/0.4/100)*100;
        const bid70=Math.round(total/0.3/100)*100;
        lines.push('수도권 규제 '+fsNoCap(bid60)+' ~ '+fsNoCap(bid70)+condNote);
      }else{
        lines.push('수도권 규제지역 현금+신용대출 활용해 올현금 입찰 가능 물건'+condNote+(needsCrCheck?' (신용대출 가능금액 확인 필요)':''));
      }
    }
    if(total>10000){
      lines.push('수도권 비규제 APT '+fs(Math.min(total,50000))+' 이하'+regionOne);
    }else if(needsCrCheck){
      lines.push('수도권 비규제지역 현금+신용대출 활용해 올현금 입찰 가능 물건 (신용대출 가능금액 확인 필요)');
    }else{
      lines.push('수도권 비규제 빌라 '+fs(total)+' 이하'+regionOne);
    }
  }
  if(hasLocal){
    const note=multi?' (공시가 2억이하)':'';
    const localPrefix=needsCrCheck&&!multi?'비수도권 APT 입찰가 기준: ':'비수도권 APT ';
    lines.push(localMin===l80bid
      ?localPrefix+fs(l80bid)+' 이하'+note
      :localPrefix+fs(localMin)+' ~ '+fs(l80bid)+note);
  }
  return lines.map((l,i)=>(i+1)+'. '+l).join('\n');
}

// 신용대출 금액이 있으면 확인 문구 추가 (CSV/PDF 공통)
function appendCreditCheckNote(text,d){
  if((d.credit_amount||0)>0){
    return text+'\n**단, 신용대출과 함께 진행 시 경락잔금대출까지 함께 나오는지 항상 확인 필요';
  }
  return text;
}

// CSV 전용: (1주택자 또는 무주택자) + 실거주(또는 단타+실거주) + 전입가능자는 [실거주]/[단타] 라벨을 붙여서 구분 (PDF 리포트는 라벨 없이, 신용대출 문구만 공통 적용)
function formatBidNarrativeCSV(d){
  const base=formatBidNarrative(d);
  const oneHouse=d.housing_type==='1주택';
  const noHouse=d.housing_type==='무주택'||d.housing_type==='생애최초';
  const tY=d.transfer_available==='Y';
  const wantsResidence=(oneHouse||noHouse)&&tY&&(d.investment_purpose==='실거주'||d.investment_purpose==='단타+실거주');
  let lines=base.split('\n');
  if(wantsResidence&&lines.length>=2){
    lines=['[실거주]',lines[0],'[단타]',...lines.slice(1)];
  }
  return appendCreditCheckNote(lines.join('\n'),d);
}

function exportCSV(){
  try{
    const headers=['기수','이름','주택수','투자금(만원)','신용대출(만원)','합산(만원)','대출가능','투자목적','전입가능','특이사항','상담메모','플래그','상담상태','상담일','이주임 확인완료','방향성'];
    const rows=students.map(d=>{
      const c=consult(d);
      const cr=d.credit_amount||0;
      return [
        d.cohort, d.name, d.housing_type,
        d.seed_amount, cr, d.seed_amount+cr,
        d.loan_available==='Y'?'가능':d.loan_available==='N'?'불가':'미확인',
        d.investment_purpose==='단타'?'단타':d.investment_purpose==='실거주'?'실거주':d.investment_purpose==='단타+실거주'?'단타+실거주':'미기재',
        d.transfer_available==='Y'?'가능':d.transfer_available==='N'?'불가':'미기재',
        d.note||'', d.consult_note||'',
        (d.flags||[]).join('/'),
        d.status||'대기', d.consult_date||'',
        '', // 이주임 확인완료 (수동 입력)
        formatBidNarrativeCSV(d) // 방향성 = 입찰 가능 금액대
      ];
    });
    const csv=[headers,...rows].map(r=>r.map(v=>{
      const s=String(v).replace(/"/g,'""');
      return '"'+s+'"';
    }).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='수강생_컨설팅_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert('CSV 내보내기 실패: '+e.message);}
}
function consult(d){
  if(d.housing_type==='미기입'){
    const errBox={st:'E',lb:'미기입',nt:'주택수 확인 필요'};
    return{
      reg:errBox, nreg:errBox, local:errBox,
      bid:'⚠ 주택수 미기입 - 확인 필요',
      primary:'', dirLabel:'',
      ltvLabel:'주택수 확인 필요'
    };
  }
  const cr=d.credit_amount||0,total=d.seed_amount+cr;
  const lY=d.loan_available==='Y',tY=d.transfer_available==='Y',lN=d.loan_available==='N';
  const isFirst=d.housing_type==='생애최초',noHouse=d.housing_type==='무주택'||isFirst;
  const oneHouse=d.housing_type==='1주택'||d.housing_type==='일시적2주택';
  const hasBig=(d.flags||[]).includes('기대출');
  // ── 지역별 가능 여부 (이미지 기준) ──────────────────────────────
  let reg,nreg,local,primary,dirLabel;

  // 수도권 규제지역 (서울 전역·경기 12곳)
  const wantsResidence=oneHouse&&tY&&(d.investment_purpose==='실거주'||d.investment_purpose==='단타+실거주');
  if(noHouse){
    reg = tY ? {st:'O',lb:'가능',nt:''} : {st:'T',lb:'조건부',nt:'신용대출 또는 현금 활용'};
  } else if(wantsResidence){
    reg = {st:'T',lb:'조건부',nt:'기존주택 처분조건부·전입조건부'};
  } else {
    reg = {st:'X',lb:'불가',nt:''};
  }

  // 수도권 비규제지역 (인천+경기 일부)
  if(noHouse){
    nreg = tY ? {st:'O',lb:'가능',nt:''} : {st:'T',lb:'조건부',nt:'신용대출 또는 현금 활용'};
  } else if(oneHouse){
    nreg = {st:'T',lb:'조건부',nt:'신용대출 또는 현금 활용'};
  } else {
    nreg = {st:'T',lb:'조건부',nt:'신용/현금 + 공시가 1억이하'};
  }

  // 비수도권 (지방 전역)
  if(noHouse||oneHouse){
    local = {st:'O',lb:'가능',nt:''};
  } else {
    local = {st:'T',lb:'조건부',nt:'공시가 2억이하'};
  }

  // 최종 투자 방향 요약
  if(noHouse){
    if(tY){
      if(total>=15000){ primary='수도권 규제지역 빌라 올현금 or 비수도권 LTV 활용';dirLabel='서울·수도권 규제'; }
      else { primary='전국 가능 — 수도권 규제 포함';dirLabel='서울·수도권 규제'; }
    } else {
      primary=total<=10000?'수도권 비규제 인천·부천 추천':'수도권 비규제 + 비수도권 우선';
      dirLabel='수도권 비규제';
    }
  } else if(oneHouse){
    const l80bid=Math.min(Math.round(total/0.2/100)*100,50000);
    if(total>10000){ primary='수도권 비규제 APT 1순위';dirLabel='수도권 비규제'; }
    else if(l80bid>=8300){ primary='수도권 비규제 인천·부천 추천';dirLabel='수도권 비규제'; }
    else { primary='';dirLabel='지방'; }
  } else {
    primary='';dirLabel='지방'; // 다주택 지방 → 빈칸
  }
  let bid;
  const CAP=50000;

  // LTV 가능 여부 판단 (minLoan: 수도권 5천만원, 비수도권 3천만원)
  function cLtv(downPct,ltvPct,minLoan){
    if(minLoan===undefined)minLoan=5000;
    const rawBid=Math.round(total/downPct/100)*100;
    const loanAmt=rawBid*ltvPct;
    const crSfx=cr>0?' · 시드+신용합산':'';
    // 자기자금 3,000만원 미만은 레버리지 계산 자체를 적용하지 않고 시드+신용대출금액 그대로 표기
    if(total<3000||loanAmt<minLoan)
      return{ok:false,bid:Math.min(total,CAP),label:'올현금'+(cr>0?' (시드+신용합산)':'')};
    return{ok:true,bid:Math.min(rawBid,CAP),label:'LTV '+Math.round(ltvPct*100)+'%'+crSfx};
  }

  function fR(v){
    const c=Math.min(v,CAP);
    if(c>=CAP)return'5억대';if(c>=40000)return'4억~5억대';if(c>=30000)return'3억~4억대';
    if(c>=20000)return'2억~3억대';if(c>=15000)return'1.5억~2억대';if(c>=10000)return'1억~1.5억대';
    if(c>=7000)return'7천~1억대';if(c>=5000)return'5천~7천만원대';if(c>=3000)return'3천~5천만원대';
    return fmt(c)+'대';
  }

  function olR(v){
    const c=Math.min(v,CAP);
    if(c>=30000)return'3억~5억대';if(c>=20000)return'2억~3억대';if(c>=15000)return'1.5억~2억대';
    if(c>=10000)return'1억~1.5억대';if(c>=7000)return'7천~1억대';if(c>=5000)return'5천~7천만원대';
    if(c>=3000)return'3천~5천만원대';return fmt(c)+'대';
  }

  // ── 입찰 가능 금액대: 수도권 규제 / 수도권 비규제 / 비수도권 각각 계산 ──
  const bAmt=Math.min(total,CAP);
  const bigInv=noHouse&&total>=15000;

  // 수도권 규제 (서울 전역·경기 12곳)
  function bidReg(){
    if(!noHouse&&!wantsResidence) return '불가';
    if(noHouse&&bigInv) return fmt(bAmt)+' (올현금 추천)';
    if(!tY) return fmt(bAmt)+' (신용/현금·조건부)';
    if(wantsResidence){
      const bid60=Math.round(total/0.4/100)*100;
      const bid70=Math.round(total/0.3/100)*100;
      return fmt(bid60)+' ~ '+fmt(bid70)+' (기존주택 처분조건부·전입조건부)';
    }
    const s=cLtv(0.3,0.7);
    return s.ok?fmt(s.bid)+' ('+s.label+')':fmt(bAmt)+' (올현금)';
  }

  // 수도권 비규제 (인천+경기 일부)
  function bidNreg(){
    if(!noHouse&&!oneHouse){ // 다주택
      return cr===0?'현금+신용대출 합산금액 (공시가 1억이하)':fmt(bAmt)+' (공시가 1억이하)';
    }
    if(oneHouse){ // 1주택
      return fmt(bAmt)+' (신용/현금·조건부)';
    }
    // 무주택/생애최초
    if(bigInv) return fmt(bAmt)+' (올현금 추천)';
    if(!tY) return fmt(bAmt)+' (신용/현금·조건부)';
    const s=cLtv(0.3,0.7);
    return s.ok?fmt(s.bid)+' ('+s.label+')':fmt(bAmt)+' (올현금)';
  }

  // 비수도권 지방APT (경락잔금대출: 최소 입찰가 8,300만원)
  function bidLocal(){
    if(total<1000) return '신용합산 필요';
    const MIN_BID=8300; // 경락잔금대출 최소 입찰가
    const MAX_STD=13000; // 표 기준: 소액투자자 최대 입찰가 기준(1억3천)
    const l60bid=Math.min(Math.round(total/0.4/100)*100,CAP);
    const l80bidRaw=Math.min(Math.round(total/0.2/100)*100,CAP);
    // 80% LTV 최소입찰가(8300) 감당 가능하면 최대는 최소 1억3천 보장
    const canAffordMin=total>=1660;
    const l80bid=canAffordMin?Math.max(l80bidRaw,MAX_STD):l80bidRaw;
    if(l80bid<MIN_BID) return fmt(bAmt)+' (올현금)';
    const minBid=Math.max(MIN_BID,l60bid);
    let txt=minBid===l80bid?fmt(l80bid)+' (LTV 80%)':fmt(minBid)+' ~ '+fmt(l80bid);
    if(!noHouse&&!oneHouse) txt+=' · 공시가2억이하';
    return txt;
  }

  bid='수도권 규제 '+bidReg()+' / 수도권 비규제 '+bidNreg()+' / 비수도권 '+bidLocal();
  // LTV 기준 레이블
  let ltvLabel;
  if(lN)
    ltvLabel=oneHouse?'수도권 비규제 신용/현금 · 비수도권 LTV 60~80% (신용대출 미활용)':noHouse?'수도권 LTV 70% · 비수도권 LTV 60~80% (신용대출 미활용)':'비수도권 LTV 60~80% (신용대출 미활용)';
  else if(total<1000)
    ltvLabel='신용대출 합산 필요';
  else if(isFirst&&hasBig)
    ltvLabel=tY?'수도권 LTV 70% · 비수도권 LTV 60~80% (기대출 확인 필요)':'수도권 올현금 (전입필요) · 비수도권 LTV 60~80% (기대출 확인 필요)';
  else if(noHouse)
    ltvLabel=tY
      ?(total>=15000?'수도권 올현금 추천 (규제지역 빌라) · 비수도권 LTV 60~80%':'수도권 LTV 70% · 비수도권 LTV 60~80%')
      :'수도권 올현금 (전입필요) · 비수도권 LTV 60~80%';
  else if(oneHouse)
    ltvLabel='수도권 비규제 신용/현금 · 비수도권 LTV 60~80%';
  else
    ltvLabel='비수도권 LTV 60~80% (수도권 불가)';

  return{reg,nreg,local,bid,primary,dirLabel,ltvLabel};
}

/* ── 색상 ── */
const SC={O:{bg:'#eaf3de',tx:'#27500a'},T:{bg:'#faeeda',tx:'#633806'},X:{bg:'#fcebeb',tx:'#791f1f'},E:{bg:'#ececec',tx:'#555'}};
const SM={O:'✓',T:'△',X:'✕',E:'⚠'};
const HC={'생애최초':{bg:'#e6f1fb',tx:'#0c447c'},'무주택':{bg:'#eaf3de',tx:'#27500a'},'1주택':{bg:'#faeeda',tx:'#633806'},'다주택':{bg:'#fcebeb',tx:'#791f1f'},'미기입':{bg:'#ececec',tx:'#555'}};
const STCLS={'완료':'s-완료','재상담':'s-재상담','대기':'s-대기'};
const STLBL={'완료':'✓ 상담완료','재상담':'↩ 재상담필요','대기':'· 상담대기'};
function fmt(v){if(v>=10000){const a=Math.floor(v/10000),r=v%10000;return r?`${a}억 ${r.toLocaleString()}만원`:`${a}억원`;}return `${v.toLocaleString()}만원`;}
function ll(l){return l==='Y'?'대출가능':l==='N'?'대출불가':'대출미확인';}
function tl(t){return t==='Y'?'전입가능':t==='N'?'전입불가':'전입미기재';}
function flb(f){return f==='기대출'?'⚠ 기대출':f==='전문가확인'?'★ 전문가확인':'↗ 명의활용';}

/* ── 카드 렌더링 ── */
function render(){
  const t=students.length;
  const fi=students.filter(s=>s.housing_type==='생애최초').length;
  const no=students.filter(s=>s.housing_type==='무주택').length;
  const on=students.filter(s=>s.housing_type==='1주택').length;
  const mu=students.filter(s=>s.housing_type==='다주택').length;
  const done=students.filter(s=>s.status==='완료').length;
  const ms=(bg,tx,lb,v)=>`<div class="stat" style="background:${bg}"><div class="slb" style="color:${tx}">${lb}</div><div class="sval" style="color:${tx}">${v}명</div></div>`;
  document.getElementById('stats').innerHTML=ms('#f0ede6','#5f5e5a','전체',t)+ms('#eaf3de','#27500a','상담완료',done)+ms('#e6f1fb','#0c447c','생애최초',fi)+ms('#eaf3de','#27500a','무주택',no)+ms('#faeeda','#633806','1주택',on)+ms('#fcebeb','#791f1f','다주택',mu);
  document.getElementById('cards').innerHTML=students.map(d=>{
    const c=consult(d),cr=d.credit_amount||0,total=d.seed_amount+cr;
    const flags=d.flags||[],hc=HC[d.housing_type]||HC['1주택'];
    const isM=d.housing_type==='다주택',dBg=isM?'#faeeda':'#eaf3de',dTx=isM?'#633806':'#27500a';
    const st=d.status||'대기';
    return `<div class="card">
      <div class="card-head">
        <div class="av">${d.cohort}</div>
        <div style="flex:1;min-width:0">
          <div style="margin-bottom:4px">
            <span class="sbadge ${STCLS[st]}" onclick="cycleStatus(${d.id},'${st}')" style="cursor:pointer" title="클릭: 상태 변경">${STLBL[st]}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-size:15px;font-weight:700">${d.name}</span>
            <span class="tag" style="background:${hc.bg};color:${hc.tx}">${d.housing_type}</span>
            <span style="font-size:11px;color:#aaa"><span style="${d.loan_available==='Y'?'color:#27500a;font-weight:600':d.loan_available==='N'?'color:#c0392b;font-weight:600':'color:#aaa'}">${ll(d.loan_available)}</span> · <span style="${d.transfer_available==='Y'?'color:#27500a;font-weight:600':d.transfer_available==='N'?'color:#c0392b;font-weight:600':'color:#aaa'}">${tl(d.transfer_available)}</span></span>
            ${flags.filter(f=>f!=='전문가확인').map(f=>`<span class="flg">${flb(f)}</span>`).join('')}
          </div>
        </div>
        <div style="display:flex;align-items:flex-start;gap:8px;flex-shrink:0">
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:700">${fmt(d.seed_amount)}</div>
            ${cr>0?`<div style="font-size:10px;color:#0c447c;margin-top:2px">+신용 ${fmt(cr)}</div><div style="font-size:12px;font-weight:700;color:#0c447c">합산 ${fmt(total)}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:row;gap:2px;align-items:center">
            <button class="pdf-btn-inline" onclick='generateReportPDF(${JSON.stringify(d)})' title="리포트 PDF 다운로드">📄</button>
            <button class="edit-btn-inline" onclick='openEdit(${JSON.stringify(d)})' title="수정">✏</button>
            <button class="del-btn-inline" onclick="delS(${d.id},'${d.name}','${d.cohort}')" title="삭제">✕</button>
          </div>
        </div>
      </div>
      <div class="rg">
        ${[['수도권 규제',c.reg],['수도권 비규제',c.nreg],['비수도권',c.local]].map(([lb,r])=>
          `<div class="rbox" style="background:${SC[r.st].bg};color:${SC[r.st].tx}">
            <div class="rl">${lb}</div>
            <div class="rv">${SM[r.st]} ${r.lb}</div>
            ${r.nt?`<div class="rn">${r.nt}</div>`:''}
          </div>`).join('')}
      </div>
      <div class="ltv-info">📊 LTV 기준 — <strong>${c.ltvLabel}</strong></div>
      <div class="bid-row" style="display:block">
        <div class="bl" style="margin-bottom:3px">입찰 가능 금액대</div>
        <div class="bv">${c.bid}</div>
      </div>
      ${c.primary?`<div class="dir-box" style="background:${dBg};color:${dTx}">→ ${c.primary}</div>`:''}
      ${d.note?`<div class="note-text">※ ${d.note}</div>`:''}
      ${d.consult_note?`<div class="consult-note">💬 ${d.consult_note}</div>`:''}
      ${d.consult_date?`<div class="consult-date">상담일: ${d.consult_date}</div>`:''}
    </div>`;
  }).join('')||'<p style="color:#aaa;padding:2rem;text-align:center">조건에 맞는 수강생이 없습니다.</p>';
}

/* ── 분석 뷰 ── */
async function renderAnalytics(){
  try{
    const stats=await api('/api/stats');
    const {total,avgSeed,byStatus,byHousing,byCohort}=stats;
    const done=(byStatus.find(s=>s.status==='완료')||{n:0}).n;
    const recon=(byStatus.find(s=>s.status==='재상담')||{n:0}).n;
    document.getElementById('anKpi').innerHTML=`<div class="an-kpi"><div class="kv">${total}</div><div class="kl">전체 수강생</div></div><div class="an-kpi"><div class="kv" style="color:#27500a">${done}</div><div class="kl">상담 완료</div></div><div class="an-kpi"><div class="kv" style="color:#633806">${recon}</div><div class="kl">재상담 필요</div></div><div class="an-kpi"><div class="kv">${fmt(avgSeed)}</div><div class="kl">평균 시드</div></div>`;
    document.getElementById('cohortTable').innerHTML=`<thead><tr><th>기수</th><th>총원</th><th>상담완료</th><th>재상담</th><th>평균시드</th></tr></thead><tbody>`+byCohort.map(c=>`<tr><td><strong>${c.cohort}</strong></td><td>${c.total}명</td><td style="color:#27500a;font-weight:600">${c.done}명</td><td style="color:#633806;font-weight:600">${c.recon}명</td><td>${fmt(Math.round(c.avg_seed))}</td></tr>`).join('')+'</tbody>';
    const mkBars=(data,tot)=>data.map(([lb,bg,tx,cnt])=>{const pct=tot?Math.round(cnt/tot*100):0;return`<div class="bar-row"><div class="br-label">${lb}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bg}"><span style="color:${tx}">${cnt}</span></div></div><div class="br-count" style="color:${tx}">${cnt}명</div></div>`;}).join('');
    const waiting=(byStatus.find(s=>s.status==='대기')||{n:0}).n;
    document.getElementById('anStatus').innerHTML=mkBars([['상담 완료','#eaf3de','#27500a',done],['재상담 필요','#faeeda','#633806',recon],['상담 대기','#f0ede6','#5f5e5a',waiting]],total);
    const hMap={'생애최초':'#e6f1fb|#0c447c','무주택':'#eaf3de|#27500a','1주택':'#faeeda|#633806','다주택':'#fcebeb|#791f1f'};
    document.getElementById('anHousing').innerHTML=mkBars(byHousing.map(h=>{const[bg,tx]=(hMap[h.housing_type]||'#f0ede6|#5f5e5a').split('|');return[h.housing_type,bg,tx,h.n];}),total);
    const all=await api('/api/students');
    const s1=all.filter(s=>s.seed_amount<3000).length,s2=all.filter(s=>s.seed_amount>=3000&&s.seed_amount<5000).length,s3=all.filter(s=>s.seed_amount>=5000&&s.seed_amount<10000).length,s4=all.filter(s=>s.seed_amount>=10000).length;
    document.getElementById('anSeed').innerHTML=mkBars([['3천 미만 (소액)','#fcebeb','#791f1f',s1],['3천~5천','#faeeda','#633806',s2],['5천~1억','#eaf3de','#27500a',s3],['1억 이상','#e6f1fb','#0c447c',s4]],total);
    const dirs=all.map(s=>consult(s).dirLabel);const uDirs=[...new Set(dirs)];
    const dC={'서울·수도권 규제':'#e6f1fb|#0c447c','수도권 비규제':'#eaf3de|#27500a','수도권 비규제/지방':'#faeeda|#633806','지방':'#f0ede6|#5f5e5a'};
    document.getElementById('anDir').innerHTML=mkBars(uDirs.map(d=>{const[bg,tx]=(dC[d]||'#f0ede6|#5f5e5a').split('|');return[d,bg,tx,dirs.filter(x=>x===d).length];}),total);
  }catch(e){console.error('분석 오류:',e);}
}

function switchView(v){curView=v;document.getElementById('cardView').style.display=v==='card'?'block':'none';document.getElementById('anView').style.display=v==='an'?'block':'none';document.getElementById('tab-card').classList.toggle('on',v==='card');document.getElementById('tab-an').classList.toggle('on',v==='an');if(v==='an')renderAnalytics();}
function toggleForm(){const f=document.getElementById('addForm');f.style.display=f.style.display==='block'?'none':'block';}
setInterval(()=>{ if(!previewMode) loadStudents(); },60000);
initData();
</script>
